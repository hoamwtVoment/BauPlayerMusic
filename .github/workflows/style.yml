name: Check style

on:
  push:
    branches-ignore:
      - gh-readonly-queue/**
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  check-style:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install clang-format 20
      run: |
        sudo wget -qO /usr/local/bin/clang-format https://github.com/muttleyxd/clang-tools-static-binaries/releases/download/master-796e77c/clang-format-20_linux-amd64
        echo "e900c1e520b6c9b9c99e43c0f45ccd12927838741cfc60c077a33dec69bb60cc  /usr/local/bin/clang-format" | sha256sum -c -
        sudo chmod +x /usr/local/bin/clang-format
        clang-format --version

    - name: Check changed C/C++ files
      shell: bash
      run: |
        base="${{ github.event.pull_request.base.sha || github.event.before }}"
        if [[ ! "$base" =~ ^[0-9a-f]{40}$ ]] || [[ "$base" == "0000000000000000000000000000000000000000" ]] || ! git cat-file -e "$base^{commit}"; then
          base=HEAD^
        fi
        mapfile -d '' files < <(git diff --diff-filter=ACMR --name-only -z "$base" HEAD -- '*.c' '*.cpp' '*.h' '*.hpp')
        python3 scripts/fix_style.py --dry-run "${files[@]}"

    - name: Check config variables
      run: python3 scripts/check_config_variables.py
