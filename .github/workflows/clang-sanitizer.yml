name: Check ASan & UBSan

on:
  push:
    branches-ignore:
      - gh-readonly-queue/**
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  check-clang-san:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: log_path=SAN:strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1:detect_leaks=1:halt_on_error=0
      CARGO_HTTP_MULTIPLEXING: false
      LSAN_OPTIONS: suppressions=../lsan.supp
      UBSAN_OPTIONS: suppressions=../ubsan.supp:log_path=SAN:print_stacktrace=1:halt_on_error=0

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Prepare Linux
      run: |
        sudo apt-get update -y
        sudo apt-get install -y cmake ninja-build pkg-config

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-bin: false

    - name: Build server with ASan and UBSan
      run: |
        SAN_FLAGS="-fsanitize=address,undefined,leak -fsanitize-recover=all -fno-omit-frame-pointer -fno-common"
        export CC=clang
        export CXX=clang++
        export CFLAGS="$SAN_FLAGS"
        export CXXFLAGS="$SAN_FLAGS"
        cmake -S . -B clang-sanitizer -G Ninja \
          -DCLIENT=OFF \
          -DCMAKE_BUILD_TYPE=Debug \
          -DDOWNLOAD_GTEST=OFF \
          -DDEV=ON \
          -DMYSQL=OFF \
          -DPREFER_BUNDLED_LIBS=ON \
          -DSERVER=ON \
          -DTOOLS=ON \
          -DWEBSOCKETS=OFF \
          -Werror=dev
        cmake --build clang-sanitizer --config Debug --target game-server --parallel

    - name: Run server with ASan and UBSan
      run: |
        cd clang-sanitizer
        ./DDNet-Server shutdown
        san_files=$(find . -maxdepth 1 -type f -name 'SAN.*' -print)
        if [ -n "$san_files" ]; then
          cat $san_files
          exit 1
        fi
