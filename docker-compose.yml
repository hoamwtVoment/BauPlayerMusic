services:
  bpmusic:
    image: bauplayermusic:latest
    # 如果还没构建镜像: docker buildx build -t bauplayermusic .
    container_name: bpmusic
    restart: unless-stopped
    ports:
      - "8303:8303/udp"
      - "8787:8787"
    volumes:
      # 持久化数据（播放队列 / SQLite / 题库）
      - ./data/musico:/app/data/musico
      # 下载的歌曲和封面
      - ./data/musicso:/app/data/musicso
      # 候选地图
      - ./data/musico/prepared_maps:/app/data/musico/prepared_maps
      # Web 地图
      - ./data/webmaps:/app/data/webmaps
      # 网易云登录 Cookie
      - ./netease_cookies.json:/app/netease_cookies.json
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
